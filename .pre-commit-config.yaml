repos:
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black

  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort
        args: ["--profile", "black"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        args: ["src/", "tests/"]
        pass_filenames: false

  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit
        entry: pip-audit --requirement requirements.txt
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: todo-requires-issue
        name: reject TODO without issue number
        entry: python scripts/check_todo_format.py
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: verify-fixtures
        name: verify committed demo-corp SQL matches generator
        entry: make fixtures-verify
        language: system
        pass_filenames: false
        stages: [pre-commit]
        files: ^tests/fixtures/demo_corp/

      - id: check-capability-registry
        name: capability registry integrity
        entry: python scripts/check_capability_registry.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
        files: ^(src/|tests/|scripts/capability_test/)

      - id: capability-test-quick
        name: capability test suite (quick)
        entry: scripts/capability-test-precommit.sh
        language: system
        pass_filenames: false
        stages: [pre-commit]
        files: ^(src/|tests/|scripts/capability_test/)

      - id: ci-local-pre-commit
        name: full CI parity (lint-and-test) — required before commit
        entry: scripts/ci-local.sh
        language: system
        pass_filenames: false
        stages: [pre-commit]
        files: ^(src/|tests/|scripts/)

      - id: public-repo-language
        name: public repo language guard (ADR-0007)
        entry: python scripts/check_public_repo_language.py
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: public-repo-language-commit-msg
        name: public repo commit message language guard
        entry: python scripts/check_public_repo_language.py
        language: system
        pass_filenames: false
        stages: [commit-msg]
        args: [--commit-msg-file]

      - id: ci-local-pre-push
        name: full CI parity (lint-and-test) — safety net on push
        entry: scripts/ci-local.sh
        language: system
        pass_filenames: false
        stages: [pre-push]
