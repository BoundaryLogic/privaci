name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

env:
  IMAGE: ghcr.io/boundarylogic/privaci
  CHART_DIR: deploy/helm/privaci

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install engine
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Contract version guard
        run: python scripts/check_contract_version.py

      - name: Pack trust-anchor guard
        run: python scripts/check_pack_key.py

  build-and-publish:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Resolve GHCR credentials
        id: ghcr
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
        run: |
          if [[ -z "${GHCR_TOKEN}" ]]; then
            echo "::error::Missing repository secret GHCR_TOKEN (classic PAT with write:packages). See docs/deployment.md#ghcr-publish-credentials."
            exit 1
          fi
          echo "username=${GHCR_USERNAME:-${GITHUB_ACTOR}}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ steps.ghcr.outputs.username }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Resolve release metadata
        id: release
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF_NAME}" == *-beta* ]]; then
            echo "channel=beta" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ steps.release.outputs.channel == 'stable' }}
            type=raw,value=latest,enable=${{ steps.release.outputs.channel == 'stable' }}
            type=raw,value=beta,enable=${{ steps.release.outputs.channel == 'beta' }}
            type=raw,value=edge,enable=${{ steps.release.outputs.channel == 'beta' }}

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PRIVACI_VERSION=${{ steps.release.outputs.version }}
            PRIVACI_CONTRACT_VERSION=1.0
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          artifact-name: privaci-sbom.spdx.json
          output-file: privaci-sbom.spdx.json

      - name: Sign image with cosign
        uses: sigstore/cosign-installer@v3

      - name: cosign sign
        run: cosign sign --yes "${IMAGE}@${{ steps.build.outputs.digest }}"
        continue-on-error: true

      - name: Package and push Helm chart
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | helm registry login ghcr.io \
            -u "${{ steps.ghcr.outputs.username }}" --password-stdin
          helm package "${CHART_DIR}" --version "${{ steps.release.outputs.version }}" --app-version "${{ steps.release.outputs.version }}"
          helm push "privaci-${{ steps.release.outputs.version }}.tgz" "oci://ghcr.io/boundarylogic/charts"
        continue-on-error: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ steps.release.outputs.prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          NOTES_FILE=".github/release-notes/${GITHUB_REF_NAME}.md"
          RELEASE_EXISTS=false
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            RELEASE_EXISTS=true
          fi
          if [[ -f "${NOTES_FILE}" ]]; then
            if [[ "${RELEASE_EXISTS}" == "true" ]]; then
              gh release edit "${GITHUB_REF_NAME}" \
                --title "${GITHUB_REF_NAME}" \
                ${PRERELEASE_FLAG} \
                --notes-file "${NOTES_FILE}"
            else
              gh release create "${GITHUB_REF_NAME}" \
                --title "${GITHUB_REF_NAME}" \
                ${PRERELEASE_FLAG} \
                --notes-file "${NOTES_FILE}"
            fi
          else
            if [[ "${RELEASE_EXISTS}" == "true" ]]; then
              gh release edit "${GITHUB_REF_NAME}" \
                --title "${GITHUB_REF_NAME}" \
                ${PRERELEASE_FLAG} \
                --notes-file - <<'EOF'
          See [CHANGELOG.md](https://github.com/BoundaryLogic/privaci/blob/main/CHANGELOG.md).

          - Plugin contract version: `1.0` (`privaci --contract-version`)
          - Config-pack trust anchor (`PRIVACI_PACK_PUBLIC_KEY`):
            `cd965cb6dadcecefd508ae84a000684f431490c3d3ddae006ad5f89bf2c25978`
            — see [pack-signing runbook](https://github.com/BoundaryLogic/privaci/blob/main/docs/runbooks/pack-signing.md)
          EOF
            else
              gh release create "${GITHUB_REF_NAME}" \
                --title "${GITHUB_REF_NAME}" \
                ${PRERELEASE_FLAG} \
                --notes-file - <<'EOF'
          See [CHANGELOG.md](https://github.com/BoundaryLogic/privaci/blob/main/CHANGELOG.md).

          - Plugin contract version: `1.0` (`privaci --contract-version`)
          - Config-pack trust anchor (`PRIVACI_PACK_PUBLIC_KEY`):
            `cd965cb6dadcecefd508ae84a000684f431490c3d3ddae006ad5f89bf2c25978`
            — see [pack-signing runbook](https://github.com/BoundaryLogic/privaci/blob/main/docs/runbooks/pack-signing.md)
          EOF
            fi
          fi
          if [[ -f privaci-sbom.spdx.json ]]; then
            gh release upload "${GITHUB_REF_NAME}" privaci-sbom.spdx.json --clobber
          fi
