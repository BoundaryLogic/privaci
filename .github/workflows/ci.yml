name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: black
        run: black --check src/ tests/

      - name: isort
        run: isort --check-only --profile black src/ tests/

      - name: ruff
        run: ruff check src/ tests/

      - name: mypy
        run: mypy src/ --strict

      - name: pack trust-anchor guard
        run: python scripts/check_pack_key.py

      - name: contract version guard
        run: python scripts/check_contract_version.py

      - name: implicit commercial contract guard
        run: python scripts/check_implicit_contracts.py

      - name: git history email guard
        run: python scripts/check_git_emails.py

      - name: public repo language guard
        run: |
          python scripts/check_public_repo_language.py
          python scripts/check_public_repo_language.py --git-log 30

      - name: pytest (unit)
        run: pytest --cov=src --cov-report=term-missing --cov-fail-under=85 -m "not integration"

      - name: pip-audit
        run: pip-audit --requirement requirements.txt
        continue-on-error: true

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: helm lint
        run: helm lint deploy/helm/privaci

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Start Postgres (compose.dev.yml)
        run: docker compose -f compose.dev.yml up -d --wait

      - name: pytest (integration, excluding slow)
        run: pytest -m "integration and not slow" -q

      - name: Stop Postgres
        if: always()
        run: docker compose -f compose.dev.yml down -v

  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify generated reference docs are current
        run: python scripts/generate_docs.py --check

      - name: Build documentation site
        run: mkdocs build --strict
