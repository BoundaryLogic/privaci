name: Publish to PyPI

# Manual-only by default so nothing is published to PyPI by accident. Once the
# PyPI project + Trusted Publisher are configured (see docs/runbooks below),
# you may add `release: {types: [published]}` to auto-publish on each release.
on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Target index"
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Check distribution metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Trusted Publishing (OIDC) — no API token needed once configured on PyPI.
    permissions:
      id-token: write
    environment:
      name: ${{ inputs.repository }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        if: ${{ inputs.repository == 'testpypi' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: ${{ inputs.repository == 'pypi' }}
        uses: pypa/gh-action-pypi-publish@release/v1
